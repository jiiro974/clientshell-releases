# =============================================================================
# publish-release.yml
# Declenche par le repo prive via repository_dispatch
# Recoit les binaires, cree une release publique, et met a jour la doc
# =============================================================================
name: Publish Public Release

on:
  repository_dispatch:
    types: [new-release]

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download artifacts from private repo
        env:
          GH_TOKEN: ${{ secrets.PRIVATE_REPO_TOKEN }}
        run: |
          TAG="${{ github.event.client_payload.tag }}"
          RELEASE_ID="${{ github.event.client_payload.release_id }}"
          REPO="jiiro974/clientshell"
          echo "Downloading artifacts for $TAG"
          mkdir -p artifacts
          gh api "repos/$REPO/releases/$RELEASE_ID/assets" \
            --jq '.[].name' | while read -r ASSET_NAME; do
            echo "  $ASSET_NAME"
            gh release download "$TAG" --repo "$REPO" --pattern "$ASSET_NAME" --dir artifacts
          done

      - name: Create public release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ github.event.client_payload.tag }}"
          BODY="${{ github.event.client_payload.body }}"
          PRE="${{ github.event.client_payload.prerelease }}"
          FLAGS=""
          [ "$PRE" = "true" ] && FLAGS="--prerelease"
          gh release create "$TAG" --title "ClientShell $TAG" --notes "$BODY" $FLAGS artifacts/*

      - name: Update release data + downloads page
        run: |
          TAG="${{ github.event.client_payload.tag }}"
          DATE=$(date -u +"%Y-%m-%d")

          # Update Jekyll data
          mkdir -p docs/_data
          printf 'version: "%s"\ndate: "%s"\n' "$TAG" "$DATE" > docs/_data/latest_release.yml

          # Generate downloads page
          mkdir -p docs/_docs
          BASE="https://github.com/jiiro974/clientshell-releases/releases/download/$TAG"
          cat > docs/_docs/downloads.md << EOF
          ---
          layout: default
          title: Telechargements
          ---
          # Telechargements — $TAG
          *Publie le $DATE*
          ## Binaires
          | Plateforme | clientshell | cs-toolbox | cs-server |
          |------------|------------|------------|-----------|
          | macOS arm64 | [Download]($BASE/clientshell-darwin-arm64) | [Download]($BASE/cs-toolbox-darwin-arm64) | [Download]($BASE/cs-server-darwin-arm64) |
          | macOS amd64 | [Download]($BASE/clientshell-darwin-amd64) | [Download]($BASE/cs-toolbox-darwin-amd64) | [Download]($BASE/cs-server-darwin-amd64) |
          | Linux amd64 | [Download]($BASE/clientshell-linux-amd64) | [Download]($BASE/cs-toolbox-linux-amd64) | [Download]($BASE/cs-server-linux-amd64) |
          | Linux arm64 | [Download]($BASE/clientshell-linux-arm64) | [Download]($BASE/cs-toolbox-linux-arm64) | [Download]($BASE/cs-server-linux-arm64) |
          | Windows amd64 | [Download]($BASE/clientshell-windows-amd64.exe) | [Download]($BASE/cs-toolbox-windows-amd64.exe) | [Download]($BASE/cs-server-windows-amd64.exe) |
          | Windows arm64 | [Download]($BASE/clientshell-windows-arm64.exe) | [Download]($BASE/cs-toolbox-windows-arm64.exe) | [Download]($BASE/cs-server-windows-arm64.exe) |
          EOF

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/
          git diff --staged --quiet || git commit -m "docs: update for ${{ github.event.client_payload.tag }}"
          git push
